name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  #===========================================
  # 1. 代码质量检查
  #===========================================
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Checkstyle
        run: mvn checkstyle:check -q || true

      - name: SpotBugs
        run: mvn spotbugs:check -q || true

  #===========================================
  # 2. 单元测试
  #===========================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: code-quality
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mindtalk_test
          POSTGRES_USER: mindtalk
          POSTGRES_PASSWORD: test123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Tests
        run: mvn test -Dspring.datasource.url=jdbc:postgresql://localhost:5432/mindtalk_test -Dspring.datasource.username=mindtalk -Dspring.datasource.password=test123 -Dspring.data.redis.host=localhost
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/mindtalk_test
          SPRING_DATASOURCE_USERNAME: mindtalk
          SPRING_DATASOURCE_PASSWORD: test123
          SPRING_DATA_REDIS_HOST: localhost

      - name: Upload Test Results
        uses: codecov/codecov-action@v3
        with:
          files: ./forum-service/target/site/jacoco/jacoco.xml
          fail_ci_if_error: false

  #===========================================
  # 3. 构建后端
  #===========================================
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn package -DskipTests -q

      - name: Upload JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-artifacts
          path: |
            gateway/target/*.jar
            forum-service/target/*.jar
          retention-days: 7

  #===========================================
  # 4. 构建前端
  #===========================================
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Dependencies
        working-directory: web
        run: npm ci

      - name: Type Check
        working-directory: web
        run: npm run typecheck || true

      - name: Build
        working-directory: web
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-artifact
          path: web/dist
          retention-days: 7
