name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  #===========================================
  # 1. 代码质量检查
  #===========================================
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Checkstyle
        run: mvn checkstyle:check -q || true

      - name: SpotBugs
        run: mvn spotbugs:check -q || true

  #===========================================
  # 2. 单元测试
  #===========================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: code-quality
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mindtalk_test
          POSTGRES_USER: mindtalk
          POSTGRES_PASSWORD: test123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Tests
        run: mvn test -Dspring.datasource.url=jdbc:postgresql://localhost:5432/mindtalk_test -Dspring.datasource.username=mindtalk -Dspring.datasource.password=test123 -Dspring.data.redis.host=localhost
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/mindtalk_test
          SPRING_DATASOURCE_USERNAME: mindtalk
          SPRING_DATASOURCE_PASSWORD: test123
          SPRING_DATA_REDIS_HOST: localhost

      - name: Upload Test Results
        uses: codecov/codecov-action@v3
        with:
          files: ./forum-service/target/site/jacoco/jacoco.xml
          fail_ci_if_error: false

  #===========================================
  # 3. 构建后端
  #===========================================
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn package -DskipTests -q

      - name: Upload JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-artifacts
          path: |
            gateway/target/*.jar
            forum-service/target/*.jar
          retention-days: 7

  #===========================================
  # 4. 构建前端
  #===========================================
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Dependencies
        working-directory: web
        run: npm ci

      - name: Type Check
        working-directory: web
        run: npm run typecheck || true

      - name: Build
        working-directory: web
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-artifact
          path: web/dist
          retention-days: 7

  #===========================================
  # 5. Docker 镜像构建和推送（仅 main 分支）
  #===========================================
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Download JAR artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-artifacts
          path: target/

      - name: Download Frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-artifact
          path: web/dist

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./gateway
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/gateway:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Forum Service
        uses: docker/build-push-action@v5
        with:
          context: ./forum-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/forum-service:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/forum-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  #===========================================
  # 6. 部署（可选，需要配置服务器）
  #===========================================
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency:
      group: deploy
      cancel-in-progress: false
    
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/mindtalk
            
            # 拉取最新镜像
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/gateway:${{ github.sha }}
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/forum-service:${{ github.sha }}
            
            # 更新 docker-compose 配置
            sed -i 's|gateway:.*|gateway:\n    image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/gateway:${{ github.sha }}|' docker-compose.yml
            sed -i 's|forum-service:.*|forum-service:\n    image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/forum-service:${{ github.sha }}|' docker-compose.yml
            
            # 重新部署（不中断正在运行的服务）
            docker compose up -d --no-deps gateway forum-service
            
            # 清理旧镜像
            docker image prune -f
            
            echo "Deployment completed successfully"

  #===========================================
  # 7. 安全扫描
  #===========================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    permissions:
      security-events: write
    
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
